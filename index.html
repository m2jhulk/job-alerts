<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkari Result Free Alerts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="alert-card">
        <h2>🔔 फ्री सरकारी जॉब अलर्ट्स</h2>
        
        <p class="description">
            UGC-NET, DDA, बैंक ऑफिसर (PNB) या किसी भी अन्य सरकारी परीक्षा की तैयारी कर रहे हैं? नई भर्तियों, एडमिट कार्ड और रिज़ल्ट के ताज़ा अपडेट्स बिना किसी देरी के सीधे अपने इनबॉक्स में पाएं।
        </p>
        
        <form id="alertForm">
            <input type="email" name="email" id="userEmail" placeholder="अपना ईमेल एड्रेस डालें..." required>
            <button type="submit" id="submitBtn">Subscribe Now</button>
        </form>
        
        <div id="statusMsg"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
