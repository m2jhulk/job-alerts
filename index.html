<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkari Result Free Alerts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="alert-card">
            <h2>🔔 फ्री सरकारी जॉब अलर्ट्स</h2>
            <p class="description">
                UPSSSC, SSC, बैंक ऑफिसर या अन्य सरकारी परीक्षा की तैयारी कर रहे हैं? ताज़ा अपडेट्स सीधे इनबॉक्स में पाएं।
            </p>
            <form id="alertForm">
                <input type="email" name="email" id="userEmail" placeholder="अपना ईमेल एड्रेस डालें..." required>
                <button type="submit" id="submitBtn">Subscribe Now</button>
            </form>
            <div id="statusMsg"></div>
        </div>

        <div class="jobs-card">
            <h3>🔥 ताज़ा अपडेट्स (Live)</h3>
            <ul id="liveJobsList">
                <li class="loading">Loading latest jobs...</li>
            </ul>
        </div>
    </div>
<div class="developer-signature">
        <div class="signature-badge">
            <span class="dev-text">Developed by</span>
            <strong class="dev-name">m2j247</strong>
            <span class="dev-divider">|</span>
            <span class="dev-skill">Python & JS Automation</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
