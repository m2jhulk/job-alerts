<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkari Result Free Alerts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="alert-card">
            <h2>🔔 फ्री सरकारी जॉब अलर्ट्स</h2>
            <p class="description">
                UPSSSC, SSC, बैंक ऑफिसर या अन्य सरकारी परीक्षा की तैयारी कर रहे हैं? ताज़ा अपडेट्स सीधे इनबॉक्स में पाएं।
            </p>
            <form id="alertForm">
                <input type="email" name="email" id="userEmail" placeholder="अपना ईमेल एड्रेस डालें..." required>
                <button type="submit" id="submitBtn">Subscribe Now</button>
            </form>
            <div id="statusMsg"></div>
        </div>

        <div class="jobs-card">
            <h3>🔥 ताज़ा अपडेट्स (Live)</h3>
            <ul id="liveJobsList">
                <li class="loading">Loading latest jobs...</li>
            </ul>
        </div>
    </div>
<!-- 🌟 डेवलपर सिग्नेचर (Freelancer Style) -->
    <div style="margin-top: 40px; text-align: center; padding-bottom: 20px; font-family: Arial, sans-serif;">
        <div style="display: inline-block; background: #ffffff; border: 1px solid #e2e8f0; padding: 10px 24px; border-radius: 50px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
            <span style="color: #64748b; font-size: 13px;">Developed by</span>
            <strong style="color: #0ea5e9; font-size: 14px; margin: 0 5px;">m2j247</strong>
            <span style="color: #cbd5e1;">|</span>
            <span style="color: #64748b; font-size: 12px; margin-left: 5px;">Python & JS Automation</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
